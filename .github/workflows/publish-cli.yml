name: Publish CLI

on:
    push:
        branches:
            - main
        paths:
            - 'packages/create/**'
            - '.github/workflows/publish-cli.yml'
    workflow_dispatch:

concurrency:
    group: publish-cli-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write
    packages: write
    id-token: write

jobs:
    publish:
        name: Publish create-next-nest-template
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.8

            - name: Setup Node.js (npm)
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org

            - name: Upgrade npm (required for Trusted Publishing)
              run: npm install -g npm@latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Bump version if already published
              id: bump
              working-directory: packages/create
              run: |
                  PACKAGE_NAME=$(node -p "require('./package.json').name")
                  LOCAL_VERSION=$(node -p "require('./package.json').version")
                  PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "")

                  if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
                    node -e "
                      const fs = require('fs');
                      const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
                      const parts = pkg.version.split('.').map(Number);
                      parts[2] += 1;
                      pkg.version = parts.join('.');
                      fs.writeFileSync('package.json', JSON.stringify(pkg, null, 4) + '\n');
                    "
                    NEW_VERSION=$(node -p "require('./package.json').version")
                    echo "bumped=true" >> "$GITHUB_OUTPUT"
                    echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
                    echo "Auto-bumped $LOCAL_VERSION → $NEW_VERSION (already on npm)"
                  else
                    echo "bumped=false" >> "$GITHUB_OUTPUT"
                    echo "version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
                    echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION (npm: ${PUBLISHED_VERSION:-none})"
                  fi

            - name: Build CLI
              working-directory: packages/create
              run: bun run build

            - name: Publish to npm
              run: npm publish --workspace=create-next-nest-template --provenance --access public --ignore-scripts

            - name: Commit version bump to main
              if: steps.bump.outputs.bumped == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add packages/create/package.json
                  git commit -m "chore(create): release v${{ steps.bump.outputs.version }} [skip ci]"
                  git push

            - name: Setup Node.js (GitHub Packages)
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: https://npm.pkg.github.com
                  scope: '@areeburrub'

            - name: Publish to GitHub Packages
              working-directory: packages/create
              run: |
                  node -e "
                    const fs = require('fs');
                    const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
                    pkg.name = '@areeburrub/create-next-nest-template';
                    pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
                    fs.writeFileSync('package.json', JSON.stringify(pkg, null, 4) + '\n');
                  "
                  npm publish --access public --ignore-scripts
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Create GitHub Release
              env:
                  VERSION: ${{ steps.bump.outputs.version }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  TAG="create-next-nest-template-v${VERSION}"
                  NOTES_FILE=$(mktemp)
                  cat > "$NOTES_FILE" <<EOF
                  Published \`create-next-nest-template@${VERSION}\` to npm and GitHub Packages.

                  **Install**
                  \`\`\`bash
                  npx create-next-nest-template
                  \`\`\`

                  - npm: https://www.npmjs.com/package/create-next-nest-template/v/${VERSION}
                  - GitHub Packages: https://github.com/${{ github.repository }}/pkgs/npm/create-next-nest-template
                  - GitHub Packages install: \`npx @areeburrub/create-next-nest-template --registry=https://npm.pkg.github.com\`
                  EOF
                  gh release create "$TAG" \
                    --title "create-next-nest-template v${VERSION}" \
                    --notes-file "$NOTES_FILE"
