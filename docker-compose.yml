services:
    postgres:
        image: postgres:16-alpine
        container_name: website-builder-postgres
        restart: unless-stopped
        ports:
            - "5434:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: website_builder
        volumes:
            - website_builder_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d website_builder"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    website_builder_postgres_data:
