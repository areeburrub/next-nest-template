services:
    postgres:
        image: postgres:16-alpine
        container_name: next-nest-template-postgres
        restart: unless-stopped
        ports:
            - "${POSTGRES_PORT:-5434}:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: next_nest_template
        volumes:
            - next_nest_template_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d next_nest_template"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    next_nest_template_postgres_data:
